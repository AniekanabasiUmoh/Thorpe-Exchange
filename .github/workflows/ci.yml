name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.1

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: njsscan (SAST)
        uses: ajinabraham/njsscan-action@7237412fdd36af1597435ef72c8d234eb60ef688
        with:
          args: ". --sarif --output results.sarif || true"

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          BREET_MOCK: "true"
          BREET_API_BASE_URL: https://api.breet.io
          SPREAD_PERCENT: "1.5"
          MIN_TX_AMOUNT: "10"
          MAX_TX_AMOUNT: "10000"
          MAX_MESSAGES_PER_MINUTE: "5"
          MAX_TX_PER_DAY: "3"
          MAX_DAILY_VOLUME_NGN: "500000"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    # Only verify the Docker build compiles — don't push to a registry yet
    steps:
      - name: Checkout
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Build Docker image (no push)
        uses: docker/build-push-action@2cdde99a51573c01c0ca3c45b7385a49dc06c9a3 # v5.3.0
        with:
          context: .
          push: false
          tags: thorpe-exchange:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
