name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  ci:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          # Fake credentials — unit tests use in-memory mocks, no real connections needed
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          BREET_MOCK: "true"
          SPREAD_PERCENT: "1.5"
          MIN_TX_AMOUNT: "10"
          MAX_TX_AMOUNT: "10000"
          MAX_MESSAGES_PER_MINUTE: "5"
          MAX_TX_PER_DAY: "3"
          MAX_DAILY_VOLUME_NGN: "500000"
