name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: njsscan (SAST)
        uses: ajinabraham/njsscan-action@231750a435d85095d33be7d192d52ec650625146 # v9
        with:
          args: ". --sarif --output results.sarif || true"

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          BREET_MOCK: "true"
          BREET_API_BASE_URL: https://api.breet.io
          SPREAD_PERCENT: "1.5"
          MIN_TX_AMOUNT: "10"
          MAX_TX_AMOUNT: "10000"
          MAX_MESSAGES_PER_MINUTE: "5"
          MAX_TX_PER_DAY: "3"
          MAX_DAILY_VOLUME_NGN: "500000"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    # Only verify the Docker build compiles — don't push to a registry yet
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image (no push)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: false
          tags: thorpe-exchange:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
